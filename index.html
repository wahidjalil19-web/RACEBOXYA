<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACE BOX PRO MAX+ V3.1 ULTRA LIGHT</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;text-align:center;}
.header{padding:20px;font-size:28px;font-weight:bold;color:#00ff9c;}
.container{padding:20px;max-width:720px;margin:auto;}
.timer{font-size:60px;font-weight:bold;margin:20px 0;color:#00ff9c;}
.status{font-size:14px;color:#aaa;margin-bottom:10px;}

.speedContainer{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap;}

.speedometer{position:relative;width:200px;height:200px;}
.speedometer svg{transform:rotate(-90deg);}

.speed-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:16px;
font-weight:bold;
color:#00ff9c;
}

.speed-text span{
font-size:28px;
}

.panel{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
margin-top:20px;
}

.card{
background:#222;
padding:15px;
border-radius:10px;
}

.card span{
font-size:18px;
color:#00ff9c;
}

.buttons{margin-top:20px;}

button{
font-size:16px;
padding:10px 16px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.start{background:#00ff9c;color:black;}
.reset{background:#ff3b3b;color:white;}
.historybtn{background:#2b7cff;color:white;}
.stop{background:#ff9900;color:black;}
.lap{background:#ffcc00;color:black;}

#history{
margin-top:20px;
text-align:left;
max-height:300px;
overflow-y:auto;
}

.historyCard{
background:#222;
padding:10px;
border-radius:8px;
margin:6px 0;
}

.footer{
margin-top:20px;
font-size:14px;
color:#777;
}
</style>
</head>

<body>

<div class="header">RACE BOX PRO MAX+ V3.1 ULTRA LIGHT</div>

<div class="container">

<div class="status" id="gpsStatus">GPS: waiting...</div>

<div class="timer" id="timer">0.000</div>


<div class="speedContainer">

<div class="speedometer">

<svg width="200" height="200">

<circle cx="100" cy="100" r="90" stroke="#444" stroke-width="15" fill="none"/>

<circle id="speedArc" cx="100" cy="100" r="90"
stroke="#00ff9c"
stroke-width="15"
fill="none"
stroke-dasharray="565"
stroke-dashoffset="565"
stroke-linecap="round"/>

</svg>

<div class="speed-text">
Speed<br><span id="speed">0</span> km/h
</div>

</div>


<div class="speedometer">

<svg width="200" height="200">

<circle cx="100" cy="100" r="90" stroke="#444" stroke-width="15" fill="none"/>

<circle id="topArc" cx="100" cy="100" r="90"
stroke="#00ff9c"
stroke-width="15"
fill="none"
stroke-dasharray="565"
stroke-dashoffset="565"
stroke-linecap="round"/>

</svg>

<div class="speed-text">
Top Speed<br><span id="topspeed">0</span> km/h
</div>

</div>

</div>


<div class="panel">

<div class="card">0-60<br><span id="zero60">-</span></div>
<div class="card">60m<br><span id="m60">-</span></div>
<div class="card">201m<br><span id="m201">-</span></div>
<div class="card">401m<br><span id="m401">-</span></div>
<div class="card">501m<br><span id="m501">-</span></div>
<div class="card">Lap<br><span id="lapCount">0</span></div>

</div>


<div class="buttons">

<button class="start" onclick="startRace()">START</button>
<button class="stop" onclick="stopRace()">STOP</button>
<button class="reset" onclick="resetRace()">RESET</button>
<button class="lap" onclick="newLap()">NEW LAP</button>
<button class="historybtn" onclick="showHistory()">HISTORY</button>

</div>

<div id="history"></div>

<div class="footer">By WHD.Project</div>

</div>


<script>

/* GLOBAL */

let watchID,startTime,initPos

let raceStarted=false
let riderName=""

let topSpeed=0
let lastSpeed=0

let zero60done=false
let m60done=false
let m201done=false
let m401done=false
let m501done=false

let lapCount=0

/* GPS ENGINE */

let kalmanSpeed=0
let kalmanGain=0.2

let speedBuffer=[]
const BUFFER_SIZE=5

let lastLat=null
let lastLon=null
let lastTime=null

function kalmanFilter(speed){

kalmanSpeed=kalmanSpeed+kalmanGain*(speed-kalmanSpeed)

return kalmanSpeed

}

function smoothAverage(speed){

speedBuffer.push(speed)

if(speedBuffer.length>BUFFER_SIZE)
speedBuffer.shift()

let sum=0

for(let s of speedBuffer) sum+=s

return sum/speedBuffer.length

}

/* SENSOR */

let accX=0
let accY=0

if(window.DeviceMotionEvent){

window.addEventListener("devicemotion",e=>{

accX=e.accelerationIncludingGravity.x||0
accY=e.accelerationIncludingGravity.y||0

})

}

/* START */

function startRace(){

resetVariables()

riderName=prompt("Masukkan nama rider","")

if(!riderName)return

navigator.geolocation.getCurrentPosition(pos=>{

initPos=pos.coords

watchID=navigator.geolocation.watchPosition(
updateRace,
error,
{enableHighAccuracy:true,maximumAge:0,timeout:15000})

})

}

/* UPDATE */

function updateRace(pos){

let acc=pos.coords.accuracy||999

if(acc>10){

gpsStatus.innerText="GPS lemah "+acc.toFixed(1)

return

}

gpsStatus.innerText="GPS akurat "+acc.toFixed(1)

/* SPEED ENGINE */

let gpsSpeed=(pos.coords.speed||0)*3.6

if(gpsSpeed===0 && lastLat!==null){

let dist=getDistance(lastLat,lastLon,pos.coords.latitude,pos.coords.longitude)

let dt=(Date.now()-lastTime)/1000

if(dt>0) gpsSpeed=(dist/dt)*3.6

}

let imuSpeed=Math.sqrt(accX*accX+accY*accY)*2

let rawSpeed=0.7*gpsSpeed+0.3*imuSpeed

rawSpeed=smoothAverage(rawSpeed)

let filteredSpeed=kalmanFilter(rawSpeed)

let maxJump=15

if(Math.abs(filteredSpeed-lastSpeed)>maxJump){

filteredSpeed=lastSpeed+(filteredSpeed-lastSpeed)*0.3

}

if(filteredSpeed<0.5) filteredSpeed=0

lastSpeed=filteredSpeed

lastLat=pos.coords.latitude
lastLon=pos.coords.longitude
lastTime=Date.now()

document.getElementById("speed").innerText=filteredSpeed.toFixed(1)

/* TOP SPEED */

if(filteredSpeed>topSpeed){

topSpeed=filteredSpeed

document.getElementById("topspeed").innerText=topSpeed.toFixed(1)

}

/* DISTANCE */

let distance=getDistance(

initPos.latitude,
initPos.longitude,
pos.coords.latitude,
pos.coords.longitude

)

/* AUTO START */

if(filteredSpeed>7 && distance>5 && !raceStarted){

raceStarted=true
startTime=Date.now()

}

/* TIMER */

if(!raceStarted)return

let time=(Date.now()-startTime)/1000

if(time<0)time=0

document.getElementById("timer").innerText=time.toFixed(3)

/* CHECKPOINT */

if(filteredSpeed>=60 && !zero60done){

zero60done=true

document.getElementById("zero60").innerText=time.toFixed(3)

}

if(distance>=60 && !m60done){

m60done=true

document.getElementById("m60").innerText=time.toFixed(3)

}

if(distance>=201 && !m201done){

m201done=true

document.getElementById("m201").innerText=time.toFixed(3)

}

if(distance>=401 && !m401done){

m401done=true

document.getElementById("m401").innerText=time.toFixed(3)

}

if(distance>=501 && !m501done){

m501done=true

document.getElementById("m501").innerText=time.toFixed(3)

stopRace()

}

}

/* STOP */

function stopRace(){

navigator.geolocation.clearWatch(watchID)

}

/* RESET */

function resetRace(){

navigator.geolocation.clearWatch(watchID)

location.reload()

}

/* LAP */

function newLap(){

lapCount++

document.getElementById("lapCount").innerText=lapCount

}

/* DISTANCE */

function getDistance(lat1,lon1,lat2,lon2){

let R=6371000

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}

function error(){

alert("GPS error")

}

</script>

</body>
</html>
